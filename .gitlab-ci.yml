stages:
  - test
  - deploy

variables:
  DEPLOY_PATH: /var/www/html

test:
  stage: test
  image: alpine:latest
  script:
    - echo 'Running basic validation...'
    - test -f app/index.html && echo 'index.html exists'
    - grep -q 'Random Places' app/index.html && echo 'Content check passed'
  only:
    - main

deploy:
  stage: deploy
  image: google/cloud-sdk:alpine
  before_script:
    - echo $GCP_SERVICE_KEY > /tmp/gcp_key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp_key.json
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - echo 'Deploying via instance metadata...'
    - |
      gcloud compute instances add-metadata $VM_NAME \
        --zone=$GCP_ZONE \
        --metadata=startup-script="#!/bin/bash
      cat > $DEPLOY_PATH/index.html << 'HTMLEOF'
      $(cat app/index.html)
      HTMLEOF"
    - gcloud compute instances reset $VM_NAME --zone=$GCP_ZONE
    - echo 'Deployment complete! VM is restarting...'
  only:
    - main
  environment:
    name: production
    url: http://$VM_EXTERNAL_IP
